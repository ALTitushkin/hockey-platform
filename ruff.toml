# Линтер/форматтер (ruff). Общий для bot/ и tools/.
target-version = "py311"
line-length = 120

[lint]
# E — стиль/ошибки, F — pyflakes (мёртвые импорты/переменные).
# I (сортировка импортов) временно выключена: включим после первого `ruff check --fix`
# локально (в CI-песочнице PyPI закрыт, авто-сортировку тут не прогнать). См. dev-audit → бэклог.
select = ["E", "F"]

[lint.per-file-ignores]
# Кодоген главы: длинные HTML/строковые литералы + намеренно компактный стиль.
# Баг-правила (F) остаются активны. Полная чистка стиля файла — в бэклоге (dev-audit).
"tools/build_chapter.py" = ["E501", "E701", "E702"]

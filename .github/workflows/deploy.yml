# Деплой бота на VPS при пуше в main.
# Требует secrets в репо (Settings → Secrets and variables → Actions):
#   VPS_HOST     — IP или домен VPS
#   VPS_USER     — пользователь ssh (например, hockey)
#   VPS_SSH_KEY  — приватный ключ (отдельный deploy-ключ, не личный!)

name: Deploy bot to VPS

on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - "data/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/hockey-platform
            git pull --ff-only origin main
            bot/venv/bin/pip install -q -r bot/requirements.txt
            sudo systemctl restart hockey-bot
            sleep 3
            systemctl is-active hockey-bot

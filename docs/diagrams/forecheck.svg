<svg viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg" font-family="'PT Mono', monospace">
  <!-- Фон -->
  <rect width="420" height="300" fill="#F1EAD9"/>

  <!-- Заголовок -->
  <text x="210" y="22" text-anchor="middle" font-family="'Oswald', sans-serif" font-size="13" font-weight="700" fill="#233048" letter-spacing="2" text-transform="uppercase">FORECHECK · ФОРЧЕК</text>
  <line x1="20" y1="28" x2="400" y2="28" stroke="#2A2A24" stroke-width="0.8" opacity="0.3"/>

  <!-- Каток: атакующая зона (правые 2/3 рисунка) -->
  <!-- Борт -->
  <rect x="20" y="38" width="380" height="245" rx="18" ry="18" fill="#EAF2F8" stroke="#2A2A24" stroke-width="1.5"/>

  <!-- Синяя линия -->
  <line x1="168" y1="38" x2="168" y2="283" stroke="#4A6E92" stroke-width="2.5"/>
  <text x="158" y="52" font-size="8" fill="#4A6E92" font-weight="700">СИНЯЯ</text>

  <!-- Красная линия ворот -->
  <line x1="360" y1="38" x2="360" y2="283" stroke="#A14A33" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Ворота -->
  <rect x="360" y="125" width="18" height="50" rx="2" fill="none" stroke="#233048" stroke-width="2"/>
  <rect x="363" y="128" width="12" height="44" fill="#233048" opacity="0.15"/>

  <!-- Пятак (slot) — зона перед воротами -->
  <rect x="290" y="110" width="70" height="80" rx="4" fill="#B08234" opacity="0.12" stroke="#B08234" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="325" y="155" text-anchor="middle" font-size="7.5" fill="#B08234" font-weight="700">СЛОТ</text>

  <!-- Точка вбрасывания -->
  <circle cx="310" cy="115" r="3.5" fill="#A14A33"/>
  <circle cx="310" cy="185" r="3.5" fill="#A14A33"/>

  <!-- Центральная точка в зоне -->
  <circle cx="270" cy="160" r="2" fill="#4A6E92"/>

  <!-- Шайба за воротами -->
  <circle cx="382" cy="180" r="6" fill="#2A2A24"/>
  <text x="382" y="183" text-anchor="middle" font-size="7" fill="#F1EAD9" font-weight="700">P</text>

  <!-- F1 — давит на шайбу -->
  <circle cx="355" cy="175" r="12" fill="#A14A33" opacity="0.9"/>
  <text x="355" y="179" text-anchor="middle" font-size="9" fill="#F1EAD9" font-weight="700">F1</text>
  <!-- Стрелка F1 -->
  <line x1="363" y1="175" x2="375" y2="178" stroke="#A14A33" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- F2 — угол зоны -->
  <circle cx="318" cy="195" r="12" fill="#A14A33" opacity="0.9"/>
  <text x="318" y="199" text-anchor="middle" font-size="9" fill="#F1EAD9" font-weight="700">F2</text>
  <!-- Стрелка F2 к пятаку -->
  <line x1="325" y1="190" x2="337" y2="178" stroke="#A14A33" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- F3 — верх зоны -->
  <circle cx="230" cy="160" r="12" fill="#A14A33" opacity="0.9"/>
  <text x="230" y="164" text-anchor="middle" font-size="9" fill="#F1EAD9" font-weight="700">F3</text>

  <!-- D1 и D2 — синяя линия -->
  <circle cx="185" cy="120" r="12" fill="#4A6E92" opacity="0.9"/>
  <text x="185" y="124" text-anchor="middle" font-size="9" fill="#F1EAD9" font-weight="700">D1</text>
  <circle cx="185" cy="200" r="12" fill="#4A6E92" opacity="0.9"/>
  <text x="185" y="204" text-anchor="middle" font-size="9" fill="#F1EAD9" font-weight="700">D2</text>

  <!-- Маркеры стрелок -->
  <defs>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#A14A33"/>
    </marker>
  </defs>

  <!-- Легенда -->
  <rect x="22" y="258" width="376" height="22" rx="3" fill="none"/>
  <circle cx="35" cy="269" r="6" fill="#A14A33" opacity="0.9"/>
  <text x="46" y="273" font-size="8.5" fill="#2A2A24">Нападающие (F1–F3)</text>
  <circle cx="160" cy="269" r="6" fill="#4A6E92" opacity="0.9"/>
  <text x="171" y="273" font-size="8.5" fill="#2A2A24">Защитники (D1–D2)</text>
  <circle cx="283" cy="269" r="6" fill="#2A2A24"/>
  <text x="294" y="273" font-size="8.5" fill="#2A2A24">Шайба</text>
</svg>
